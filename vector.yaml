sources:
  gen: { type: demo_logs, format: syslog, interval: 0.0, count: 999999999 }
transforms:
  crunch:
    type: remap
    inputs: [gen]
    source: |
      .parsed = parse_syslog!(string!(.message))
      .upper = upcase(string!(.message))
      .lower = downcase(.upper)
sinks:
  devnull: { type: blackhole, inputs: [crunch], print_interval_secs: 5 }
